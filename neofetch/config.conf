put() {
    prin "\n\n ${1}"
}

puts() {
    info "\n\n ${1}" ${2}
}

colors() {
    local color_output="\n \n"
    for i in {0..7}; do
        color_output+="$(color ${i})в¬¤ "
        color_output+="$(color ${i} + 8)в¬¤ "
        if [ $i -eq 3 ]; then
            color_output+="\n \n"   
        fi
    done
    prin "${color_output}"
}

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
memory_percent="off"
memory_unit="mib"
