include-file = colors.ini
include-file = settings.ini
include-file = modules/cpu.ini
include-file = modules/date.ini
include-file = modules/memory.ini
include-file = modules/reboot.ini
include-file = modules/shutdown.ini
include-file = modules/tray.ini
include-file = modules/xworkspaces.ini

[bar/main]
width = 100%
height = 20pt
radius = 15

dpi = 100

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 5pt
border-color = #00000000

padding-left = 3
padding-right = 3

module-margin = 1

font-0 = Hack Nerd Font:size=12;2

modules-left = xworkspaces
modules-right = tray memory cpu date reboot shutdown

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
